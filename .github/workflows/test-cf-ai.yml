name: Test Cloudflare Workers AI

on:
  workflow_dispatch:

jobs:
  test-ai:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install requests
        run: python -m pip install requests

      - name: Test Workers AI
        env:
          CF_ACCT_ID: ${{ secrets.CF_ACCT_ID }}
          CF_AI_WORKERS: ${{ secrets.CF_AI_WORKERS }}
        run: python scripts/test_cloudflare_ai.py
