name: Update Beacon External

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install -r requirements.txt

      - name: Update Beacon data
        run: python scripts/update.py
        env:
          CBIBS_API_KEY: ${{ secrets.CBIBS_API_KEY }}
          CF_ACCT_ID: ${{ secrets.CF_ACCT_ID }}
          CF_AI_WORKERS: ${{ secrets.CF_AI_WORKERS }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/
          git diff --cached --quiet || git commit -m "Update conditions"
          git push
